<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Digital Café – Podcasts & Shorts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --text: #e0e0ff;
      --accent: #7b5eff;
      --card: #111;
      --border: #222;
      --dim: #888;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    canvas#bg {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .sticky-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 900;
      color: #ffffff;
    }

    .hamburger {
      position: absolute;
      left: 16px;
      font-size: 1.8rem;
      cursor: pointer;
      color: #ffffff;
    }

    main {
      position: relative;
      z-index: 2;
      max-width: 1280px;
      margin: 0 auto;
      padding: 80px 1rem 4rem;
    }

    .hero { display: none; }

    @media (min-width: 641px) {
      .sticky-header { display: none; }
      .hero {
        display: block;
        text-align: center;
        padding: 10vh 1rem 8vh;
      }
      .hero h1 {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: clamp(4.2rem, 9vw, 7.2rem);
        line-height: 0.92;
        letter-spacing: -0.03em;
        color: #ffffff;
        text-shadow: 0 0 50px rgba(123,94,255,0.45);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }

    @media (max-width: 640px) {
      main { padding-top: 80px; }
      #end-msg { display: none; }
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2.5rem;
    }

    @media (min-width: 641px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .card:hover { transform: scale(1.02); }

    .wrapper { position: relative; width: 100%; background: #000; }
    .placeholder { position: absolute; inset: 0; background: linear-gradient(135deg, #1e1b4b, #312e81 50%, #4338ca); display: flex; align-items: center; justify-content: center; }
    .play { width: 70px; height: 70px; fill: rgba(255,255,255,0.9); filter: drop-shadow(0 6px 16px #000); }
    .player { position: absolute; inset: 0; display: none; }
    .playing .player { display: block; }
    .playing .placeholder { display: none; }
    .title { padding: 1.2rem 1.4rem; font-size: 1.05rem; line-height: 1.4; text-align: center; }

    #end-msg {
      text-align: center;
      padding: 5rem 1rem;
      font-size: 1.3rem;
      color: var(--dim);
      opacity: 0;
      transition: opacity 0.8s;
    }

    .podcast-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.94); z-index: 9999; display: none; flex-direction: column; padding: 80px 1rem 2rem; overflow-y: auto; }
    .overlay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .overlay-header h2 { font-size: 1.8rem; color: var(--accent); }
    .close-btn { font-size: 2.4rem; cursor: pointer; color: #ffffff; }
    .podcast-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="sticky-header">
  <div class="hamburger" onclick="document.getElementById('podcastOverlay').style.display='flex'">&#9776;</div>
  Digital Café
</div>

<main>
  <div class="hero">
    <h1>Digital Café</h1>
  </div>

  <div class="grid" id="grid"></div>

  <div id="end-msg">Konec obsahu</div>
</main>

<div class="podcast-overlay" id="podcastOverlay">
  <div class="overlay-header">
    <h2>Podcasty (16:9)</h2>
    <span class="close-btn" onclick="document.getElementById('podcastOverlay').style.display='none'">&times;</span>
  </div>
  <div class="podcast-grid" id="podcastGrid"></div>
</div>

<script>
// Particles background
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  particles = [];
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.8,
      vy: (Math.random() - 0.5) * 0.8,
      r: Math.random() * 2.4 + 1.2
    });
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.fillStyle = 'rgba(123,94,255,0.9)';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();

    particles.forEach(q => {
      let d = Math.hypot(p.x - q.x, p.y - q.y);
      if (d < 150) {
        ctx.strokeStyle = `rgba(123,94,255,${0.48 * (1 - d/150)})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
      }
    });
  });
  requestAnimationFrame(animate);
}

window.addEventListener('resize', resize);
resize(); animate();

// Tvé původní data
const desktopVideos = [
  {id: 'g63fEK72sjM', title: 'AI Music Generator Lyria 3 – Top 5 Hard & Heavy', type: 'video'},
  {id: 'zECdzNFLwEU', title: 'LTX-2 Open-source Video Model – Low VRAM demo', type: 'video'},
  {id: '2VrNKZeSXHY', title: 'AI Avatar Geeks – Created With ComfyUI', type: 'video'},
];

const mobileShorts = [
  {id: 'g63fEK72sjM', title: 'Lyria 3 – Hard & Heavy Shorts', type: 'short'},
  {id: 'zECdzNFLwEU', title: 'LTX-2 Quick Demo Short', type: 'short'},
  {id: '2VrNKZeSXHY', title: 'AI Avatars – 60s tip', type: 'short'},
];

const isMobile = window.innerWidth < 641;
const activeList = isMobile ? mobileShorts : desktopVideos;
const grid = document.getElementById('grid');
const podcastGrid = document.getElementById('podcastGrid');
const endMsg = document.getElementById('end-msg');
let index = 0;
const batch = 5;

function createCard(v) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="wrapper" style="aspect-ratio: ${v.type === 'short' ? '9/16' : '16/9'}">
      <div class="placeholder">
        <svg class="play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="player">
        <iframe src="" title="${v.title}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
      </div>
    </div>
    <div class="title">${v.title}</div>
  `;
  const iframe = card.querySelector('iframe');
  card.onclick = () => {
    if (card.classList.contains('playing')) return;
    iframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
    card.classList.add('playing');
  };
  return card;
}

function loadBatch() {
  const frag = document.createDocumentFragment();
  for (let i = 0; i < batch && index < activeList.length; i++) {
    frag.appendChild(createCard(activeList[index++]));
  }
  grid.appendChild(frag);
  if (index >= activeList.length) {
    endMsg.style.opacity = '1';
  }
}

const obs = new IntersectionObserver(e => {
  if (e[0].isIntersecting) loadBatch();
}, {threshold: 0.1});

obs.observe(endMsg);

loadBatch();

// Na mobilu do overlay přidáme původní podcasty + tyto Shorts
if (isMobile) {
  // Původní podcasty (16:9)
  desktopVideos.forEach(v => {
    podcastGrid.appendChild(createCard(v));
  });

  // Nově přidané Shorts (vertikální)
  const shortsInOverlay = [
    {id: 'ifS73sx2RMM', title: 'AI v českých školách: Poslechni si podcast', type: 'short'},
    {id: 'Z6HrL7YxoFM', title: 'Samsung S26 Ultra: Gateway do Galaxy AI', type: 'short'},
    {id: '6eKEcMqunRU', title: 'DJI ROMO Hack Par Excellence / DIY', type: 'short'},
    {id: '9_yNp0mhOZE', title: 'AI právě rozbíjí hry i Hollywood', type: 'short'},
    {id: '3jL6ysJdfo8', title: 'ComfyUI Sora 2 API', type: 'short'},
  ];

  shortsInOverlay.forEach(v => {
    podcastGrid.appendChild(createCard(v));
  });
}
</script>
</body>
</html>
